<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:spaceless>
    <f:layout name="Default"/>
    
    <f:section name="Main">
        <div class="row w-100 {f:if(condition: flexFormData.spacing, then: 'spacing{flexFormData.spacing}')} {f:if(condition: data.layout, then: '{data.layout}')} {f:if(condition: flexFormData.halign, then: '{flexFormData.halign}')} {f:if(condition: flexFormData.valign, then: '{flexFormData.valign}')}">
            <f:if condition="{childrenLeft}">
                <f:then>
                    <div class="{flexFormData.Col1} {flexFormData.smCol1} {flexFormData.mdCol1} {flexFormData.lgCol1} {flexFormData.xlCol1} {flexFormData.xxlCol1} {flexFormData.col21class} col">
                        <f:for each="{childrenLeft}" as="child">
                            <f:format.raw>{child.renderedContent}</f:format.raw>
                        </f:for>
                    </div>
                </f:then>
                <f:else>
                    <div class="{flexFormData.Col1} {flexFormData.smCol1} {flexFormData.mdCol1} {flexFormData.lgCol1} {flexFormData.xlCol1} {flexFormData.xxlCol1} {flexFormData.col21class} col">
                    </div>
                </f:else>  
            </f:if>
            <f:if condition="{childrenRight}">
                <f:then>            
                <div class="{flexFormData.Col2} {flexFormData.smCol2} {flexFormData.mdCol2} {flexFormData.lgCol2} {flexFormData.xlCol2} {flexFormData.xxlCol2} {flexFormData.col22class} col">
                    <f:for each="{childrenRight}" as="child">
                        <f:format.raw>{child.renderedContent}</f:format.raw>
                    </f:for>
                </div>
                </f:then>
                <f:else>    
                    <div class="{flexFormData.Col2} {flexFormData.smCol2} {flexFormData.mdCol2} {flexFormData.lgCol2} {flexFormData.xlCol2} {flexFormData.xxlCol2} {flexFormData.col22class} col">
                    </div>                
                </f:else>                              
            </f:if>  
        </div>
    </f:section>    
</f:spaceless>
</html>
